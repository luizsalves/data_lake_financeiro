version: "3.9"

services:
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: always

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 2; done;
      /usr/bin/mc mb -p local/${MINIO_LANDING_BUCKET:-planejamento-landing} || true;
      /usr/bin/mc mb -p local/${MINIO_RAW_BUCKET:-planejamento-raw} || true;
      /usr/bin/mc mb -p local/${MINIO_INTEGRATION_BUCKET:-planejamento-integration} || true;
      /usr/bin/mc mb -p local/${MINIO_BUSINESS_BUCKET:-planejamento-business} || true;
      exit 0;
      "

  metastore-db:
    image: postgres:15
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    ports:
      - "5433:5432"
    volumes:
      - metastore-db:/var/lib/postgresql/data

  hive-metastore:
    build:
      context: ./platform/hive
      dockerfile: Dockerfile
    depends_on:
      - metastore-db
      - minio
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://metastore-db:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    ports:
      - "9083:9083"
    volumes:
      - ./platform/hive/conf/core-site.xml:/opt/hive/conf/core-site.xml:ro
      - ./platform/hive/conf/metastore-site.xml:/opt/hive/conf/metastore-site.xml:ro

  trino:
    image: trinodb/trino:470
    depends_on:
      - hive-metastore
      - minio
    ports:
      - "8081:8080"
    volumes:
      - ./platform/trino/etc/config.properties:/etc/trino/config.properties:ro
      - ./platform/trino/etc/jvm.config:/etc/trino/jvm.config:ro
      - ./platform/trino/etc/node.properties:/etc/trino/node.properties:ro
      - ./platform/trino/etc/catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties:ro

volumes:
  minio-data:
  metastore-db:
