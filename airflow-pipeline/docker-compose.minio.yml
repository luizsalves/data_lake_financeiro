version: '3'

services:
  airflow-webserver:
    environment:
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: http://minio:9000
      S3_ENDPOINT_URL: http://minio:9000
      MINIO_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AIRFLOW_VAR_ENV: ${AIRFLOW_VAR_ENV:-local}
      AIRFLOW_VAR_REGION: ${AIRFLOW_VAR_REGION:-us-east-1}
      AIRFLOW_VAR_ACCOUNT: ${AIRFLOW_VAR_ACCOUNT:-minio}
      AIRFLOW_VAR_REVERSEDATASETPATH: ${AIRFLOW_VAR_REVERSEDATASETPATH:-s3a://business/reverse}
      AIRFLOW_VAR_DOMAINSPATH: ${AIRFLOW_VAR_DOMAINSPATH:-s3a://landing/config/domains.json}
      AIRFLOW_VAR_SALTSPATH: ${AIRFLOW_VAR_SALTSPATH:-s3a://landing/config/salts.json}
      SPARK_ENABLE_DELTA: "false"
  airflow-scheduler:
    environment:
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: http://minio:9000
      S3_ENDPOINT_URL: http://minio:9000
      MINIO_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AIRFLOW_VAR_ENV: ${AIRFLOW_VAR_ENV:-local}
      AIRFLOW_VAR_REGION: ${AIRFLOW_VAR_REGION:-us-east-1}
      AIRFLOW_VAR_ACCOUNT: ${AIRFLOW_VAR_ACCOUNT:-minio}
      AIRFLOW_VAR_REVERSEDATASETPATH: ${AIRFLOW_VAR_REVERSEDATASETPATH:-s3a://business/reverse}
      AIRFLOW_VAR_DOMAINSPATH: ${AIRFLOW_VAR_DOMAINSPATH:-s3a://landing/config/domains.json}
      AIRFLOW_VAR_SALTSPATH: ${AIRFLOW_VAR_SALTSPATH:-s3a://landing/config/salts.json}
      SPARK_ENABLE_DELTA: "false"
  airflow-worker:
    environment:
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: http://minio:9000
      S3_ENDPOINT_URL: http://minio:9000
      MINIO_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AIRFLOW_VAR_ENV: ${AIRFLOW_VAR_ENV:-local}
      AIRFLOW_VAR_REGION: ${AIRFLOW_VAR_REGION:-us-east-1}
      AIRFLOW_VAR_ACCOUNT: ${AIRFLOW_VAR_ACCOUNT:-minio}
      AIRFLOW_VAR_REVERSEDATASETPATH: ${AIRFLOW_VAR_REVERSEDATASETPATH:-s3a://business/reverse}
      AIRFLOW_VAR_DOMAINSPATH: ${AIRFLOW_VAR_DOMAINSPATH:-s3a://landing/config/domains.json}
      AIRFLOW_VAR_SALTSPATH: ${AIRFLOW_VAR_SALTSPATH:-s3a://landing/config/salts.json}
      SPARK_ENABLE_DELTA: "false"
  airflow-triggerer:
    environment:
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: http://minio:9000
      S3_ENDPOINT_URL: http://minio:9000
      MINIO_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AIRFLOW_VAR_ENV: ${AIRFLOW_VAR_ENV:-local}
      AIRFLOW_VAR_REGION: ${AIRFLOW_VAR_REGION:-us-east-1}
      AIRFLOW_VAR_ACCOUNT: ${AIRFLOW_VAR_ACCOUNT:-minio}
      AIRFLOW_VAR_REVERSEDATASETPATH: ${AIRFLOW_VAR_REVERSEDATASETPATH:-s3a://business/reverse}
      AIRFLOW_VAR_DOMAINSPATH: ${AIRFLOW_VAR_DOMAINSPATH:-s3a://landing/config/domains.json}
      AIRFLOW_VAR_SALTSPATH: ${AIRFLOW_VAR_SALTSPATH:-s3a://landing/config/salts.json}
      SPARK_ENABLE_DELTA: "false"
  airflow-init:
    environment:
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: http://minio:9000
      S3_ENDPOINT_URL: http://minio:9000
      MINIO_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AIRFLOW_VAR_ENV: ${AIRFLOW_VAR_ENV:-local}
      AIRFLOW_VAR_REGION: ${AIRFLOW_VAR_REGION:-us-east-1}
      AIRFLOW_VAR_ACCOUNT: ${AIRFLOW_VAR_ACCOUNT:-minio}
      AIRFLOW_VAR_REVERSEDATASETPATH: ${AIRFLOW_VAR_REVERSEDATASETPATH:-s3a://business/reverse}
      AIRFLOW_VAR_DOMAINSPATH: ${AIRFLOW_VAR_DOMAINSPATH:-s3a://landing/config/domains.json}
      AIRFLOW_VAR_SALTSPATH: ${AIRFLOW_VAR_SALTSPATH:-s3a://landing/config/salts.json}
      SPARK_ENABLE_DELTA: "false"
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio-data:/data
    restart: always

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 2; done;
      /usr/bin/mc mb -p local/${MINIO_LANDING_BUCKET:-landing} || true;
      /usr/bin/mc mb -p local/${MINIO_RAW_BUCKET:-raw} || true;
      /usr/bin/mc mb -p local/${MINIO_INTEGRATION_BUCKET:-integration} || true;
      /usr/bin/mc mb -p local/${MINIO_BUSINESS_BUCKET:-business} || true;
      exit 0;
      "

volumes:
  minio-data:
